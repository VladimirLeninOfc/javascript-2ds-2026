<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input type="text" id="teste">
    <button onclick="enviar()">Enviar</button>
    <script>
        let nome = "André";
        let idade = 15;
        let altura = 1.60;
        let estudando = true;
        document.write("<h1>"+nome+"</h1>");
        document.write("<br>");
        document.write("<h2>"+idade+"</h2>");
        document.write("<br>");
        document.write(altura);
        document.write("<br>");
        document.write(estudando);
        let teste = document.getElementById("teste");
        function enviar(){
            document.write(teste);
        }
        
    </script>

</body>
</html>
